name: Flutter Nightly Build

on:
  # GSPSoporte: se quito el cron nocturno (compilaba solo cada noche, ~1h de CI
  # sin necesidad). Solo se dispara MANUALMENTE cuando lo necesitamos.
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
